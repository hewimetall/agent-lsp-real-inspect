pre_mortem:
    overall_risk: medium
    rows:
        - scenario: Wave 2 agents add gcf-go import but use wrong import alias
          likelihood: low
          impact: medium
          mitigation: |
            Agent task specifies exact import aliases: gcf for internal/encoding/gcf,
            gcfgo for github.com/blackwell-systems/gcf-go. Build gate catches mismatches.
        - scenario: max() builtin not available in older Go versions
          likelihood: low
          impact: high
          mitigation: |
            go.mod specifies go 1.26.1 which has the max() builtin. No risk.
        - scenario: URIToFilePath returns error for malformed URIs in test data
          likelihood: medium
          impact: low
          mitigation: |
            All payload builders use _ for the error return from URIToFilePath,
            falling back to empty string or the original filePath. Tests use
            valid file:// URIs.
        - scenario: Agent modifies a file outside ownership (especially helpers.go from Wave 2)
          likelihood: medium
          impact: high
          mitigation: |
            Each Wave 2 agent task includes explicit constraint not to modify
            helpers.go. Build gate verifies compilation without helpers.go changes.
        - scenario: detect_changes GCF early return loses risk classification data
          likelihood: medium
          impact: low
          mitigation: |
            Acceptable tradeoff documented in Agent B task. Graph encoding provides
            structural symbol data; risk classification is a JSON-only enrichment.
            GCF consumers use gcf-proxy session dedup instead.
        - scenario: Duplicate symbol QualifiedNames in payload cause dedup collisions
          likelihood: medium
          impact: medium
          mitigation: |
            Each payload builder uses a seen map to deduplicate by QualifiedName.
            QualifiedName function uses file path + symbol name for uniqueness.
