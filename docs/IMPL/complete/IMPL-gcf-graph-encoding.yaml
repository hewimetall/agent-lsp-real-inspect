title: GCF Graph Payload Encoding for Symbol-Returning Tools
feature_slug: gcf-graph-encoding
verdict: SUITABLE
suitability_assessment: |
    Suitability gate results:

    1. File decomposition: 10+ files across two clear phases. Phase 1 creates
       the shared type mapping layer (2 new files in internal/encoding/gcf/).
       Phase 2 migrates 8 existing tool handlers. All handlers are in separate
       files with disjoint ownership. PASS.

    2. Investigation-first items: None. The gcf-go v1.0.0 API is stable and
       already in go.mod. The Payload/Symbol/Edge types are documented. The
       existing EncodeResult pathway is well understood. PASS.

    3. Interface discoverability: Yes. The EncodeGraphResult function signature
       and the BuildGraphPayload helper can be fully specified from gcf-go types.
       Each tool handler's mapping from its result type to Payload is deterministic.
       PASS.

    4. Pre-implementation status: encode.go has Encode() wrapping EncodeGeneric.
       helpers.go has EncodeResult() with json/gcf switch. No graph encoding
       exists yet. All work is TODO.

    5. Parallelization value: Build+test cycle is ~10s (GOWORK=off go test ./internal/...).
       8 tool handlers can be migrated in parallel by 4 agents (2 files each).
       Wave 1 (type mapping layer) is a dependency for Wave 2 (tool migration).
       Clear speedup: 4 parallel agents vs 8 sequential file edits.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~12 min (Wave 1: 1 agent ~5 min, Wave 2: 4 agents ~7 min parallel)
    - Merge and verification: ~4 min
    Total Polywave time: ~24 min

    Sequential baseline: ~40 min (5 agents x 8 min avg)
    Time savings: ~16 min (40% faster)

    Recommendation: Clear speedup. Proceed.
