pre_mortem:
    overall_risk: medium
    rows:
        - scenario: gcf-go EncodeGeneric does not handle nested structs with omitempty tags correctly
          likelihood: medium
          impact: medium
          mitigation: |
            Agent A's tests verify encoding with nested structs. GCF fallback to JSON
            in EncodeResult ensures no data loss even if encoding fails.
        - scenario: Agent B's helpers.go import of internal/encoding/gcf fails to compile in isolation (Agent A not merged yet)
          likelihood: high
          impact: low
          mitigation: |
            This is expected in worktree isolation. Agent B can stub the import or
            the scaffold provides a compilable stub. Both agents are in Wave 1 and
            merge before Wave 2 starts.
        - scenario: locationsResult signature change breaks callers in symbol_path.go or coverage_round3_test.go
          likelihood: low
          impact: low
          mitigation: |
            Both cascade files (symbol_path.go, coverage_round3_test.go) are assigned
            to Agent D alongside navigation.go. Agent D updates all callers in one pass.
        - scenario: Removing json import from tool files that still use json.Marshal for intermediate serialization
          likelihood: medium
          impact: low
          mitigation: |
            Agent task prompts explicitly warn to check for other json.Marshal calls
            before removing the import. go build will catch any mistake immediately.
        - scenario: gcf-go v0.1.1 tag does not exist or API differs from docs
          likelihood: low
          impact: high
          mitigation: |
            Agent A should try v0.1.1 first, fall back to v0.1.0 or latest. The
            Encode wrapper isolates the rest of the codebase from API changes.
