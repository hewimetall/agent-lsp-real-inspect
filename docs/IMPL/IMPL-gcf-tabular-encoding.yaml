        - id: B
          task: |
            ## What to implement

            Add the output format threading infrastructure: context helpers in
            helpers.go and the outputFormat field on toolDeps in server.go.

            ### 1. Add format context helpers to internal/tools/helpers.go

            Add these functions after the existing `appendHint` function (the last
            function in the file, ending at the closing brace around line 132):

            ```go
            // outputFormatKey is a context key for output format preference.
            type outputFormatKey struct{}

            // ContextWithOutputFormat returns a context carrying the output format.
            func ContextWithOutputFormat(ctx context.Context, format string) context.Context {
                return context.WithValue(ctx, outputFormatKey{}, format)
            }

            // OutputFormatFromContext returns the output format from context.
            // Returns "json" if no format is set.
            func OutputFormatFromContext(ctx context.Context) string {
                if v, ok := ctx.Value(outputFormatKey{}).(string); ok && v != "" {
                    return v
                }
                return "json"
            }

            // EncodeResult marshals data as JSON or GCF based on context format.
            // Falls back to JSON if GCF encoding fails or format is unrecognized.
            func EncodeResult(ctx context.Context, data any) (types.ToolResult, error) {
                format := OutputFormatFromContext(ctx)
                switch format {
                case "gcf":
                    encoded, err := gcf.Encode(data)
                    if err != nil {
                        // Fall back to JSON on GCF encoding failure
                        raw, _ := json.Marshal(data)
                        return types.TextResult(string(raw)), nil
                    }
                    return types.TextResult(encoded), nil
                default:
                    raw, err := json.Marshal(data)
                    if err != nil {
                        return types.ErrorResult(err.Error()), nil
                    }
                    return types.TextResult(string(raw)), nil
                }
            }
            ```

