title: GCF Tabular Encoding Integration
feature_slug: gcf-tabular-encoding
verdict: SUITABLE
suitability_assessment: |
    Suitability gate results:

    1. File decomposition: Yes. Work spans 10+ files across 3 packages (internal/encoding/gcf/,
       internal/tools/, cmd/agent-lsp/). Clear boundaries between encoding layer, helper
       integration, and tool migration.

    2. Investigation-first items: None. Architecture is fully documented in docs/gcf-integration.md.
       All tool handlers follow the same json.Marshal pattern. No unknowns.

    3. Interface discoverability: Yes. The encodeResult helper signature and gcf.Encode wrapper
       can be fully defined before implementation. Format negotiation through toolDeps is
       straightforward.

    4. Pre-implementation status: gcf-go dependency is NOT yet in go.mod (contrary to feature
       description). This is a Wave 1 concern. No existing GCF code in the repo.

    5. Parallelization value: High. Wave 2 has 4 independent agents each migrating different
       tool files. Build+test cycle is ~30s (go test ./internal/... ./cmd/...). Each agent
       touches 2-5 files.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~8 min (2 waves; Wave 1: 2 agents ~5 min; Wave 2: 4 agents ~5 min parallel)
    - Merge and verification: ~4 min
    Total Polywave time: ~22 min

    Sequential baseline: ~40 min (6 agents x ~7 min avg)
    Time savings: ~18 min (45% faster)

    Recommendation: Clear speedup. Six agents with non-trivial logic, independent file
    ownership in Wave 2, and a meaningful build/test cycle.
