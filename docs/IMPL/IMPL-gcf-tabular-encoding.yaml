interface_contracts:
    - name: gcf.Encode
      description: Wraps gcf-go EncodeGeneric for tabular encoding of tool response data
      definition: |
        // internal/encoding/gcf/encode.go
        package gcf

        import gcfgo "github.com/blackwell-systems/gcf-go"

        // Encode converts any structured data to GCF tabular format string.
        // Falls back gracefully: returns error if data cannot be encoded.
        func Encode(data any) (string, error) {
            return gcfgo.EncodeGeneric(data)
        }
      location: internal/encoding/gcf/encode.go
    - name: encodeResult
      description: Format-aware encoding helper that switches between JSON and GCF based on context
      definition: |
        // internal/tools/helpers.go

        // outputFormatKey is a context key for the output format preference.
        type outputFormatKey struct{}

        // ContextWithOutputFormat returns a new context with the output format set.
        func ContextWithOutputFormat(ctx context.Context, format string) context.Context {
            return context.WithValue(ctx, outputFormatKey{}, format)
        }

        // OutputFormatFromContext returns the output format from context, defaulting to "json".
        func OutputFormatFromContext(ctx context.Context) string {
            if v, ok := ctx.Value(outputFormatKey{}).(string); ok && v != "" {
                return v
            }
            return "json"
        }

        // EncodeResult marshals data as JSON or GCF based on the output format in ctx.
        // Falls back to JSON if GCF encoding fails.
        func EncodeResult(ctx context.Context, data any) (types.ToolResult, error) {
            format := OutputFormatFromContext(ctx)
            switch format {
            case "gcf":
                encoded, err := gcf.Encode(data)
                if err != nil {
                    raw, _ := json.Marshal(data)
                    return types.TextResult(string(raw)), nil
                }
                return types.TextResult(encoded), nil
            default:
                raw, err := json.Marshal(data)
                if err != nil {
                    return types.ErrorResult(err.Error()), nil
                }
                return types.TextResult(string(raw)), nil
            }
        }
      location: internal/tools/helpers.go
    - name: toolDeps.outputFormat
      description: New field on toolDeps to carry the session output format preference
      definition: |
        // cmd/agent-lsp/server.go
        // Add to toolDeps struct:
        type toolDeps struct {
            // ... existing fields ...
            outputFormat string // "json" (default) or "gcf"
        }
      location: cmd/agent-lsp/server.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to implement

            Create the `internal/encoding/gcf/` package and add the gcf-go dependency.

            ### 1. Add gcf-go dependency

            Run `go get github.com/blackwell-systems/gcf-go@v0.1.1` to add the dependency
            to go.mod and go.sum. If v0.1.1 is not available, use the latest available tag.

            ### 2. Create internal/encoding/gcf/encode.go

            Create a new file `internal/encoding/gcf/encode.go` with package `gcf`:

            ```go
            package gcf

            import gcfgo "github.com/blackwell-systems/gcf-go"

            // Encode converts structured data to GCF tabular format.
            // Uses gcf-go's EncodeGeneric which handles arbitrary Go values
            // via reflection, producing pipe-delimited tabular output with
            // field declaration headers.
            func Encode(data any) (string, error) {
                return gcfgo.EncodeGeneric(data)
            }
            ```

            If `EncodeGeneric` does not exist in the gcf-go API, check the package
            documentation for the correct function name. The function should accept
            `any` and return a GCF-encoded string.

            ### 3. Create internal/encoding/gcf/encode_test.go

            Write tests that verify:
            - Encoding a slice of structs produces valid GCF tabular output
            - Encoding a map with nested slices produces valid output
            - Encoding nil returns empty/error gracefully
            - Round-trip: encode a struct slice, verify the output contains
              the expected field names and pipe-separated values
            - Test with types representative of agent-lsp tool responses:
              a struct with Name, File, Line fields (like symbolRef)

            ### Interfaces

            ```go
            func Encode(data any) (string, error)
            ```

            ### Constraints
            - Do NOT modify any files outside your ownership list (go.mod, go.sum,
              internal/encoding/gcf/encode.go, internal/encoding/gcf/encode_test.go)
            - Do NOT add session-level GCF state; that is a future feature
            - Do NOT import internal/types or any other agent-lsp package;
              this package must only depend on gcf-go

            ### Verification
            ```bash
            go build ./internal/encoding/gcf/...
            go test ./internal/encoding/gcf/...
            go vet ./internal/encoding/gcf/...
            ```

            ### Postconditions
            ```bash
            # gcf-go dependency is in go.mod
            grep -c "blackwell-systems/gcf-go" go.mod
            # Expected: 1

            # Encode function exists
            grep -c "func Encode" internal/encoding/gcf/encode.go
            # Expected: 1
            ```
