# Publish Rust/PyO3 wheels to PyPI on version tags (v*).
#
# PyPI trusted publishers (pending or active) must match:
#   Owner: hewimetall
#   Repository: agent-lsp-real-inspect
#   Workflow: release.yml
#   Environment: pypi
#
# Projects (one Trusted Publisher each):
#   - agent-lsp-state
#   - agent-lsp-git
#   - agent-lsp-docker
#   - agent-lsp-real-inspect-mcp   ← main; ``uvx agent-lsp-real-inspect-mcp``
#
# ``agent-lsp`` on PyPI is the upstream Go package — do not reuse that name.
#
# macOS matrix follows ``maturin generate-ci github`` (2026):
#   macos-15-intel → x86_64, macos-latest → aarch64
name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Broadest practical macOS support for both Intel + Apple Silicon wheels.
  MACOSX_DEPLOYMENT_TARGET: "11.0"

jobs:
  build:
    name: Build (${{ matrix.platform.runner }} / ${{ matrix.platform.target }} / ${{ matrix.package.artifact }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        package:
          - workdir: packages/agent-lsp-state
            artifact: agent-lsp-state
          - workdir: packages/agent-lsp-git
            artifact: agent-lsp-git
          - workdir: packages/agent-lsp-docker
            artifact: agent-lsp-docker
          - workdir: .
            artifact: agent-lsp-real-inspect-mcp
        platform:
          # Linux x86_64 (manylinux)
          - runner: ubuntu-latest
            target: x86_64
            manylinux: auto
            tag: linux-x86_64
          # macOS Intel (dedicated Intel runner — not cross from arm)
          - runner: macos-15-intel
            target: x86_64
            manylinux: "off"
            tag: macos-x86_64
          # macOS Apple Silicon
          - runner: macos-latest
            target: aarch64
            manylinux: "off"
            tag: macos-aarch64
          # Windows x64
          - runner: windows-latest
            target: x64
            manylinux: "off"
            tag: windows-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp versions from tag
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          chmod +x scripts/release-set-version.sh
          ./scripts/release-set-version.sh "${GITHUB_REF_NAME}"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Build wheels; on linux also emit sdist in the same invocation so we do not
      # re-enter maturin with a leftover RUSTC_WRAPPER=sccache from manylinux.
      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          working-directory: ${{ matrix.package.workdir }}
          target: ${{ matrix.platform.target }}
          command: build
          args: >-
            --release -o dist --interpreter 3.12
            ${{ matrix.platform.tag == 'linux-x86_64' && '--sdist' || '' }}
          sccache: "true"
          manylinux: ${{ matrix.platform.manylinux }}
          rust-toolchain: stable

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.package.artifact }}-${{ matrix.platform.tag }}
          path: ${{ matrix.package.workdir }}/dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/agent-lsp-real-inspect-mcp/
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp versions (for local metadata)
        run: |
          chmod +x scripts/release-set-version.sh
          ./scripts/release-set-version.sh "${GITHUB_REF_NAME}"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Show dist
        run: find dist -type f | sort

      - name: Smoke test (linux manylinux wheels only)
        shell: bash
        run: |
          set -euo pipefail
          # CRITICAL: dist/ also has macosx_* and win_amd64 wheels. Plain
          # `ls *.whl | head -1` picks macosx_arm64 alphabetically and uv fails
          # with "incompatible with the current platform" on the Linux runner.
          pick_manylinux() {
            local pattern="$1"
            local hit
            hit=$(compgen -G "dist/${pattern}*manylinux*.whl" | sort | head -1 || true)
            if [[ -z "$hit" ]]; then
              echo "missing manylinux wheel for ${pattern}" >&2
              ls -la dist/ >&2 || true
              exit 1
            fi
            printf '%s\n' "$hit"
          }
          state=$(pick_manylinux agent_lsp_state-)
          gitw=$(pick_manylinux agent_lsp_git-)
          dock=$(pick_manylinux agent_lsp_docker-)
          core=$(pick_manylinux agent_lsp_real_inspect_mcp-)
          echo "smoke wheels: $state | $gitw | $dock | $core"
          uv run --isolated --no-project \
            --with "$state" --with "$gitw" --with "$dock" --with "$core" \
            tests/smoke_pypi.py

      - name: Publish to PyPI (Trusted Publisher)
        run: |
          set -euo pipefail
          shopt -s nullglob
          # Dump METADATA Name before each upload. A pending Trusted Publisher
          # whose project name != this Name creates an empty project then fails
          # with: "Non-user identities cannot create new projects".
          dump_names() {
            local f
            for f in "$@"; do
              python3 - "$f" <<'PY'
          import re, sys, tarfile, zipfile
          path = sys.argv[1]
          if path.endswith(".whl"):
              with zipfile.ZipFile(path) as z:
                  meta = next(n for n in z.namelist() if n.endswith("METADATA"))
                  text = z.read(meta).decode()
          else:
              with tarfile.open(path) as t:
                  mem = next(m for m in t.getmembers() if m.name.endswith("PKG-INFO"))
                  text = t.extractfile(mem).read().decode()
          name = re.search(r"^Name:\s*(.+)$", text, re.M).group(1).strip()
          ver = re.search(r"^Version:\s*(.+)$", text, re.M).group(1).strip()
          print(f"  {path}: Name={name!r} Version={ver!r}")
          PY
            done
          }
          publish_one() {
            local prefix="$1"
            local files=(dist/${prefix}-*)
            local log
            if [[ ${#files[@]} -eq 0 || ! -e "${files[0]}" ]]; then
              echo "no artifacts for ${prefix}" >&2
              return 1
            fi
            echo "=== publishing ${prefix} (${#files[@]} files) ==="
            dump_names "${files[@]}"
            log="$(mktemp)"
            # Retry-safe: a prior partial release may already have uploaded some
            # files (e.g. main landed, siblings blocked on pending publishers).
            if uv publish "${files[@]}" 2>&1 | tee "$log"; then
              echo "OK ${prefix}"
              return 0
            fi
            if rg -qi 'file already exists|already been uploaded|403.*already' "$log"; then
              echo "OK ${prefix} (already on PyPI)"
              return 0
            fi
            echo "FAIL ${prefix}" >&2
            return 1
          }
          # Main first (may already be on PyPI from a partial v0.1.6 run).
          # Continue siblings even if one fails so CI reports every missing publisher.
          failed=()
          for prefix in \
            agent_lsp_real_inspect_mcp \
            agent_lsp_state \
            agent_lsp_git \
            agent_lsp_docker
          do
            publish_one "$prefix" || failed+=("$prefix")
          done
          if ((${#failed[@]} > 0)); then
            echo >&2
            echo "Publish incomplete. Failed packages: ${failed[*]}" >&2
            echo "Each needs a PyPI Trusted Publisher whose project name matches" >&2
            echo "wheel METADATA Name: exactly (env=pypi, workflow=release.yml)." >&2
            echo "See docs/guide/pypi-release.md" >&2
            exit 1
          fi

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --title "$tag" \
              --generate-notes \
              --verify-tag
          fi
          gh release upload "$tag" dist/* --clobber

      - name: Print install hint
        run: |
          ver="${GITHUB_REF_NAME#v}"
          cat <<EOF
          Published ${GITHUB_REF_NAME} to PyPI.

            uvx agent-lsp-real-inspect-mcp
            uvx agent-lsp-real-inspect-mcp==${ver}
            uv tool install agent-lsp-real-inspect-mcp==${ver}
            agent-lsp

          macOS wheels: x86_64 (macos-15-intel) + aarch64 (macos-latest)
          EOF
