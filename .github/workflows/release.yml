# Publish the single Rust/PyO3 wheel to PyPI on version tags (v*).
#
# One PyPI Trusted Publisher:
#   Project: agent-lsp-real-inspect-mcp
#   Owner: hewimetall
#   Repository: agent-lsp-real-inspect
#   Workflow: release.yml
#   Environment: pypi
#
# ``agent-lsp`` on PyPI is the upstream Go package — do not reuse that name.
# state / git / docker native types ship inside this one wheel.
#
# macOS matrix follows ``maturin generate-ci github`` (2026):
#   macos-15-intel → x86_64, macos-latest → aarch64
name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: "11.0"

jobs:
  build:
    name: Build (${{ matrix.platform.runner }} / ${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
            manylinux: auto
            tag: linux-x86_64
          - runner: macos-15-intel
            target: x86_64
            manylinux: "off"
            tag: macos-x86_64
          - runner: macos-latest
            target: aarch64
            manylinux: "off"
            tag: macos-aarch64
          - runner: windows-latest
            target: x64
            manylinux: "off"
            tag: windows-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp versions from tag
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          chmod +x scripts/release-set-version.sh
          ./scripts/release-set-version.sh "${GITHUB_REF_NAME}"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Build wheels; on linux also emit sdist in the same invocation so we do not
      # re-enter maturin with a leftover RUSTC_WRAPPER=sccache from manylinux.
      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          command: build
          args: >-
            --release -o dist --interpreter 3.12
            ${{ matrix.platform.tag == 'linux-x86_64' && '--sdist' || '' }}
          sccache: "true"
          manylinux: ${{ matrix.platform.manylinux }}
          rust-toolchain: stable

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.tag }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/agent-lsp-real-inspect-mcp/
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp versions (for local metadata)
        run: |
          chmod +x scripts/release-set-version.sh
          ./scripts/release-set-version.sh "${GITHUB_REF_NAME}"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Show dist
        run: find dist -type f | sort

      - name: Smoke test (linux manylinux wheel only)
        shell: bash
        run: |
          set -euo pipefail
          # CRITICAL: dist/ also has macosx_* and win_amd64 wheels. Plain
          # `ls *.whl | head -1` picks macosx_arm64 alphabetically and uv fails
          # with "incompatible with the current platform" on the Linux runner.
          hit=$(compgen -G "dist/agent_lsp_real_inspect_mcp-*manylinux*.whl" | sort | head -1 || true)
          if [[ -z "$hit" ]]; then
            echo "missing manylinux wheel" >&2
            ls -la dist/ >&2 || true
            exit 1
          fi
          echo "smoke wheel: $hit"
          uv run --isolated --no-project --with "$hit" tests/smoke_pypi.py

      - name: Publish to PyPI (Trusted Publisher)
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/agent_lsp_real_inspect_mcp-*)
          if [[ ${#files[@]} -eq 0 || ! -e "${files[0]}" ]]; then
            echo "no artifacts for agent_lsp_real_inspect_mcp" >&2
            exit 1
          fi
          echo "=== publishing agent_lsp_real_inspect_mcp (${#files[@]} files) ==="
          for f in "${files[@]}"; do
            python3 - "$f" <<'PY'
          import re, sys, tarfile, zipfile
          path = sys.argv[1]
          if path.endswith(".whl"):
              with zipfile.ZipFile(path) as z:
                  meta = next(n for n in z.namelist() if n.endswith("METADATA"))
                  text = z.read(meta).decode()
          else:
              with tarfile.open(path) as t:
                  mem = next(m for m in t.getmembers() if m.name.endswith("PKG-INFO"))
                  text = t.extractfile(mem).read().decode()
          name = re.search(r"^Name:\s*(.+)$", text, re.M).group(1).strip()
          ver = re.search(r"^Version:\s*(.+)$", text, re.M).group(1).strip()
          print(f"  {path}: Name={name!r} Version={ver!r}")
          PY
          done
          uv publish "${files[@]}"

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --title "$tag" \
              --generate-notes \
              --verify-tag
          fi
          gh release upload "$tag" dist/* --clobber

      - name: Print install hint
        run: |
          ver="${GITHUB_REF_NAME#v}"
          cat <<EOF
          Published ${GITHUB_REF_NAME} to PyPI (single package).

            uvx agent-lsp-real-inspect-mcp
            uvx agent-lsp-real-inspect-mcp==${ver}
            uv tool install agent-lsp-real-inspect-mcp==${ver}
            agent-lsp --help

          macOS wheels: x86_64 (macos-15-intel) + aarch64 (macos-latest)
          EOF
