name: mcp-assert
on:
  workflow_dispatch:
    inputs:
      lint_threshold:
        description: 'Lint error threshold (0 = strict)'
        required: false
        default: '0'

jobs:
  mcp-assert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: GOWORK=off go build ./...

      - name: Install gopls
        run: go install golang.org/x/tools/gopls@latest

      - name: Install mcp-assert
        run: |
          git clone --depth 1 https://github.com/blackwell-systems/mcp-assert.git /tmp/mcp-assert
          cd /tmp/mcp-assert && GOWORK=off go install ./cmd/mcp-assert

      - name: Run tool correctness assertions
        run: |
          mcp-assert ci \
            --suite examples/mcp-assert/go \
            --fixture ${{ github.workspace }}/test/fixtures/go \
            --timeout 120s \
            --threshold 100 \
            --reuse-server \
            --junit results.xml \
            --badge badge.json
        env:
          AGENT_LSP_OUTPUT_FORMAT: json

      - name: Lint MCP tool schemas
        run: |
          mcp-assert lint \
            --server "agent-lsp go:gopls" \
            --threshold ${{ inputs.lint_threshold }}
        env:
          AGENT_LSP_OUTPUT_FORMAT: json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-assert-results
          path: |
            results.xml
            badge.json
