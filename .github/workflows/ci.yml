name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Unit tests + binary smoke tests. No live LSP servers needed.
  unit-and-smoke:
    runs-on: ubuntu-latest
    env:
      GOWORK: "off"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./internal/... ./cmd/...

      - name: Install TypeScript language server
        run: npm install -g typescript-language-server typescript

      - name: Binary smoke tests
        run: GOWORK=off go test -run TestBinary ./...

  # Core languages: Go, TypeScript, Python, Rust, Kotlin
  multi-lang-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: GOWORK=off go build ./...

      - name: Install gopls
        run: go install golang.org/x/tools/gopls@latest

      - name: Install TypeScript language server
        run: npm install -g typescript-language-server typescript

      - name: Install Pyright
        run: npm install -g pyright

      - name: Install Rust toolchain + rust-analyzer
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-analyzer

      - name: Install kotlin-language-server
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KLS_VERSION=$(curl -fsSL -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/fwcd/kotlin-language-server/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          wget -q "https://github.com/fwcd/kotlin-language-server/releases/download/${KLS_VERSION}/server.zip" -O /tmp/kls.zip
          sudo unzip -q /tmp/kls.zip -d /opt/kls
          sudo ln -sf /opt/kls/server/bin/kotlin-language-server /usr/local/bin/kotlin-language-server

      - name: Run core language tests
        run: GOWORK=off go test -v -run "TestMultiLanguage/^(Go|TypeScript|Python|Rust|Kotlin)$" ./test/ -timeout 30m

  # Java (jdtls) — isolated job to avoid memory contention with other language servers.
  # jdtls cold-start requires sole access to runner memory; SIGTERM under multi-server
  # load indicates OOM kill. continue-on-error since jdtls download is external.
  multi-lang-java:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build
        run: GOWORK=off go build ./...

      - name: Install jdtls
        run: |
          # Resolve the latest snapshot URL via redirect and download with error checking
          JDTLS_URL="https://download.eclipse.org/jdtls/snapshots/jdt-language-server-latest.tar.gz"
          wget --no-verbose "$JDTLS_URL" -O /tmp/jdtls.tar.gz
          # Verify the download is a valid gzip file before extracting
          file /tmp/jdtls.tar.gz
          sudo mkdir -p /opt/jdtls
          sudo tar -xzf /tmp/jdtls.tar.gz -C /opt/jdtls
          # jdtls writes log files to config_linux/ — must be writable by runner user
          sudo chmod -R a+w /opt/jdtls/config_linux
          LAUNCHER=$(ls /opt/jdtls/plugins/org.eclipse.equinox.launcher_*.jar 2>/dev/null | head -1)
          if [ -z "$LAUNCHER" ]; then
            echo "ERROR: jdtls launcher JAR not found after extraction" >&2
            ls /opt/jdtls/plugins/ | head -20 >&2
            exit 1
          fi
          echo "Found launcher: $LAUNCHER"
          # Wrapper script passes "$@" so tests control -data dir via serverArgs.
          # Do NOT hardcode -data here — the test's serverArgs provide it.
          printf '#!/bin/bash\nexec java \\\n  -Declipse.application=org.eclipse.jdt.ls.core.id1 \\\n  -Dosgi.bundles.defaultStartLevel=4 \\\n  -Declipse.product=org.eclipse.jdt.ls.core.product \\\n  -Dlog.level=ERROR \\\n  -Xmx2G \\\n  --add-modules=ALL-SYSTEM \\\n  --add-opens java.base/java.util=ALL-UNNAMED \\\n  --add-opens java.base/java.lang=ALL-UNNAMED \\\n  -jar %s \\\n  -configuration /opt/jdtls/config_linux \\\n  "$@"\n' "$LAUNCHER" | sudo tee /usr/local/bin/jdtls > /dev/null
          sudo chmod +x /usr/local/bin/jdtls
          echo "jdtls installed at $(which jdtls)"

      - name: Compile Java fixture (jdtls needs target/classes)
        run: cd test/fixtures/java && mvn -q compile

      - name: Create jdtls workspace dirs
        run: |
          mkdir -p /tmp/jdtls-workspace-lsp-mcp-test
          mkdir -p /tmp/jdtls-smoke-test

      - name: Smoke-test jdtls startup
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"processId":null,"rootUri":null,"capabilities":{}}}' \
            | timeout 10 jdtls -data /tmp/jdtls-smoke-test 2>&1 | head -20 || true

      - name: Run Java language tests
        run: GOWORK=off go test -v -run "TestMultiLanguage/^Java$" ./test/ -timeout 15m

  # Extended languages: C, C++, JavaScript, PHP, Ruby, YAML, JSON, Dockerfile, CSharp
  multi-lang-extended:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: GOWORK=off go build ./...

      - name: Install clangd
        run: sudo apt-get install -y clangd

      - name: Install TypeScript language server (for JavaScript)
        run: npm install -g typescript-language-server typescript

      - name: Install intelephense
        run: npm install -g intelephense

      - name: Install solargraph (Ruby)
        run: sudo gem install solargraph

      - name: Install yaml-language-server
        run: npm install -g yaml-language-server

      - name: Install vscode-langservers-extracted (JSON server)
        run: npm install -g vscode-langservers-extracted

      - name: Install dockerfile-language-server-nodejs
        run: npm install -g dockerfile-language-server-nodejs

      - name: Install csharp-ls
        run: dotnet tool install -g csharp-ls

      - name: Run extended language tests
        run: GOWORK=off go test -v -run "TestMultiLanguage/^(C|C\+\+|JavaScript|PHP|Ruby|YAML|JSON|Dockerfile|CSharp|CSS|HTML)$" ./test/ -timeout 20m

  # Zig via zls
  multi-lang-zig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: GOWORK=off go build ./...

      - name: Install Zig + zls
        run: |
          ZIG_VERSION="0.14.0"
          wget -q "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" -O /tmp/zig.tar.xz
          sudo tar -xJf /tmp/zig.tar.xz -C /opt
          sudo ln -sf "/opt/zig-linux-x86_64-${ZIG_VERSION}/zig" /usr/local/bin/zig
          wget -q "https://github.com/zigtools/zls/releases/download/${ZIG_VERSION}/zls-x86_64-linux.tar.xz" -O /tmp/zls.tar.xz
          sudo mkdir -p /opt/zls
          sudo tar -xJf /tmp/zls.tar.xz -C /opt/zls
          sudo chmod +x /opt/zls/zls
          sudo ln -sf /opt/zls/zls /usr/local/bin/zls

      - name: Run Zig tests
        run: GOWORK=off go test -v -run "TestMultiLanguage/^Zig$" ./test/ -timeout 10m

  # Terraform via terraform-ls
  multi-lang-terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: GOWORK=off go build ./...

      - name: Install terraform-ls
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TF_LS_VERSION=$(curl -fsSL -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/hashicorp/terraform-ls/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          wget -q "https://releases.hashicorp.com/terraform-ls/${TF_LS_VERSION}/terraform-ls_${TF_LS_VERSION}_linux_amd64.zip" -O /tmp/terraform-ls.zip
          sudo unzip -o -q /tmp/terraform-ls.zip terraform-ls -d /usr/local/bin
          sudo chmod +x /usr/local/bin/terraform-ls

      - name: Run Terraform tests
        run: GOWORK=off go test -v -run "TestMultiLanguage/^Terraform$" ./test/ -timeout 10m

  # Lua via lua-language-server
  multi-lang-lua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: GOWORK=off go build ./...

      - name: Install lua-language-server
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LLS_VERSION=$(curl -fsSL -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/LuaLS/lua-language-server/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          echo "Installing lua-language-server ${LLS_VERSION}"
          wget -q "https://github.com/LuaLS/lua-language-server/releases/download/${LLS_VERSION}/lua-language-server-${LLS_VERSION}-linux-x64.tar.gz" -O /tmp/lls.tar.gz
          sudo mkdir -p /opt/lls
          sudo tar -xzf /tmp/lls.tar.gz -C /opt/lls
          sudo ln -sf /opt/lls/bin/lua-language-server /usr/local/bin/lua-language-server

      - name: Run Lua tests
        run: GOWORK=off go test -v -run "TestMultiLanguage/^Lua$" ./test/ -timeout 10m

  # Swift via sourcekit-lsp — macOS runner required (sourcekit-lsp ships with Xcode)
  multi-lang-swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: GOWORK=off go build ./...

      - name: Run Swift tests
        run: GOWORK=off go test -v -run "TestMultiLanguage/^Swift$" ./test/ -timeout 15m

  # Scala via metals — best-effort; metals cold-start is slow and may exceed timeout
  multi-lang-scala:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build
        run: GOWORK=off go build ./...

      - name: Install Coursier + metals
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use cs bootstrap with explicit Maven coordinates — bypasses the app catalog entirely
          # (cs install hits io.get-coursier:apps from Maven Central which 403s in CI)
          CS_VERSION=$(curl -fsSL -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/coursier/coursier/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          curl -fL "https://github.com/coursier/coursier/releases/download/v${CS_VERSION}/cs-x86_64-pc-linux.gz" | gzip -d > /tmp/cs
          chmod +x /tmp/cs
          sudo mv /tmp/cs /usr/local/bin/cs
          METALS_VERSION=$(curl -fsSL -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/scalameta/metals/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          cs bootstrap "org.scalameta:metals_2.13:${METALS_VERSION}" -o /tmp/metals
          sudo mv /tmp/metals /usr/local/bin/metals
          sudo chmod +x /usr/local/bin/metals

      - name: Run Scala tests
        run: GOWORK=off go test -v -run "TestMultiLanguage/^Scala$" ./test/ -timeout 30m

  # Prisma via @prisma/language-server
  multi-lang-prisma:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: GOWORK=off go build ./...

      - name: Install Prisma language server and CLI
        run: npm install -g @prisma/language-server@5 prisma@5

      - name: Initialize Prisma fixture project
        run: |
          cd test/fixtures/prisma
          npm install
          prisma generate

      - name: Run Prisma tests
        env:
          LOG_LEVEL: debug
          CHECKPOINT_DISABLE: "1"
        run: GOWORK=off go test -v -run "TestMultiLanguage/^Prisma$" ./test/ -timeout 10m 2>&1

  # Gleam via gleam lsp (built-in to the gleam binary)
  multi-lang-gleam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: GOWORK=off go build ./...

      - name: Install Gleam
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GLEAM_VERSION=$(curl -fsSL -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/gleam-lang/gleam/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          wget -q "https://github.com/gleam-lang/gleam/releases/download/v${GLEAM_VERSION}/gleam-v${GLEAM_VERSION}-x86_64-unknown-linux-musl.tar.gz" -O /tmp/gleam.tar.gz
          sudo tar -xzf /tmp/gleam.tar.gz -C /usr/local/bin

      - name: Build Gleam fixture
        run: cd test/fixtures/gleam && gleam build --target javascript

      - name: Run Gleam tests
        run: GOWORK=off go test -v -run "TestMultiLanguage/^Gleam$" ./test/ -timeout 10m

  # Elixir via elixir-ls
  multi-lang-elixir:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.16'
          otp-version: '26'

      - name: Build
        run: GOWORK=off go build ./...

      - name: Install ElixirLS
        run: |
          git clone --depth 1 https://github.com/elixir-lsp/elixir-ls.git /tmp/elixir-ls
          cd /tmp/elixir-ls
          mix deps.get
          MIX_ENV=prod mix elixir_ls.release2 -o /opt/elixir-ls
          sudo chmod +x /opt/elixir-ls/language_server.sh
          sudo ln -sf /opt/elixir-ls/language_server.sh /usr/local/bin/elixir-ls

      - name: Run Elixir tests
        run: GOWORK=off go test -v -run "TestMultiLanguage/^Elixir$" ./test/ -timeout 15m

  # Speculative session lifecycle (Go, TypeScript, Python, Rust, C++, CSharp, Dart, Java)
  speculative-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build
        run: GOWORK=off go build ./...

      - name: Install gopls
        run: go install golang.org/x/tools/gopls@latest

      - name: Install TypeScript language server
        run: npm install -g typescript-language-server typescript

      - name: Install Pyright
        run: npm install -g pyright

      - name: Install Rust toolchain + rust-analyzer
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-analyzer

      - name: Install clangd
        run: sudo apt-get install -y clangd

      - name: Install csharp-ls
        run: dotnet tool install -g csharp-ls

      - name: Install Dart SDK
        run: |
          sudo apt-get install -y apt-transport-https
          wget -qO- https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/dart.gpg
          echo 'deb [signed-by=/usr/share/keyrings/dart.gpg arch=amd64] https://storage.googleapis.com/download.dartlang.org/linux/debian stable main' | sudo tee /etc/apt/sources.list.d/dart_stable.list
          sudo apt-get update
          sudo apt-get install -y dart

      - name: Install jdtls
        continue-on-error: true
        run: |
          wget -q "https://download.eclipse.org/jdtls/snapshots/jdt-language-server-latest.tar.gz" -O /tmp/jdtls.tar.gz
          sudo mkdir -p /opt/jdtls
          sudo tar -xzf /tmp/jdtls.tar.gz -C /opt/jdtls
          # jdtls writes log files to config_linux/ — must be writable by runner user
          sudo chmod -R a+w /opt/jdtls/config_linux
          LAUNCHER=$(ls /opt/jdtls/plugins/org.eclipse.equinox.launcher_*.jar | head -1)
          printf '#!/bin/bash\nexec java \\\n  -Declipse.application=org.eclipse.jdt.ls.core.id1 \\\n  -Dosgi.bundles.defaultStartLevel=4 \\\n  -Declipse.product=org.eclipse.jdt.ls.core.product \\\n  -Dlog.level=ERROR \\\n  -Xmx1G \\\n  --add-modules=ALL-SYSTEM \\\n  --add-opens java.base/java.util=ALL-UNNAMED \\\n  --add-opens java.base/java.lang=ALL-UNNAMED \\\n  -jar %s \\\n  -configuration /opt/jdtls/config_linux \\\n  "$@"\n' "$LAUNCHER" | sudo tee /usr/local/bin/jdtls > /dev/null
          sudo chmod +x /usr/local/bin/jdtls

      - name: Compile Java fixture (jdtls needs target/classes)
        run: cd test/fixtures/java && mvn -q compile

      - name: Create jdtls workspace dir
        run: mkdir -p /tmp/jdtls-workspace-speculative-test

      - name: Run speculative session tests
        run: GOWORK=off go test -v -run TestSpeculativeSessions ./test/ -timeout 20m
        env:
          AGENT_LSP_OUTPUT_FORMAT: json

  # SQL via sqls (requires live PostgreSQL service)
  multi-lang-sql:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: GOWORK=off go build ./...

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Load schema into testdb
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d testdb -f test/fixtures/sql/schema.sql

      - name: Install sqls
        run: go install github.com/sqls-server/sqls@latest

      - name: Run SQL tests
        run: GOWORK=off go test -v -run "TestMultiLanguage/^SQL$" ./test/ -timeout 10m

  # Clojure via clojure-lsp (native binary, no JVM needed)
  multi-lang-clojure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: GOWORK=off go build ./...

      - name: Install clojure-lsp
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CLOJURE_LSP_VERSION=$(curl -fsSL -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/clojure-lsp/clojure-lsp/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          wget -q "https://github.com/clojure-lsp/clojure-lsp/releases/download/${CLOJURE_LSP_VERSION}/clojure-lsp-native-linux-amd64.zip" -O /tmp/clojure-lsp.zip
          sudo unzip -q /tmp/clojure-lsp.zip -d /usr/local/bin
          sudo chmod +x /usr/local/bin/clojure-lsp

      - name: Run Clojure tests
        run: GOWORK=off go test -v -run "TestMultiLanguage/^Clojure$" ./test/ -timeout 10m

  # Nix via nil language server
  multi-lang-nix:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: GOWORK=off go build ./...

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Install nil (Nix language server)
        run: nix profile install github:oxalica/nil

      - name: Add nil to PATH
        run: echo "$HOME/.nix-profile/bin" >> $GITHUB_PATH

      - name: Run Nix tests
        run: GOWORK=off go test -v -run "TestMultiLanguage/^Nix$" ./test/ -timeout 10m

  # Dart via dart analysis-server
  multi-lang-dart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: GOWORK=off go build ./...

      - name: Install Dart SDK
        run: |
          sudo apt-get install -y apt-transport-https
          wget -qO- https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/dart.gpg
          echo 'deb [signed-by=/usr/share/keyrings/dart.gpg arch=amd64] https://storage.googleapis.com/download.dartlang.org/linux/debian stable main' | sudo tee /etc/apt/sources.list.d/dart_stable.list
          sudo apt-get update
          sudo apt-get install -y dart

      - name: Run Dart tests
        run: GOWORK=off go test -v -run "TestMultiLanguage/^Dart$" ./test/ -timeout 10m

  # MongoDB via mongodb-language-server (extracted from mongodb-js/vscode VSIX)
  # Requires live mongo:7 service container. continue-on-error: true because the
  # extracted server may not support --stdio without VS Code extension host context.
  multi-lang-mongodb:
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: GOWORK=off go build ./...

      - name: Install mongodb-language-server (from VS Code extension VSIX)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MDBVSC_VERSION=$(curl -fsSL -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/mongodb-js/vscode/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          wget -q "https://github.com/mongodb-js/vscode/releases/download/v${MDBVSC_VERSION}/mongodb-vscode-${MDBVSC_VERSION}.vsix" -O /tmp/mongodb-vscode.vsix
          sudo mkdir -p /opt/mongodb-vscode
          sudo unzip -q /tmp/mongodb-vscode.vsix -d /opt/mongodb-vscode
          printf '#!/bin/bash\nexec node /opt/mongodb-vscode/extension/dist/languageServer.js "$@"\n' | sudo tee /usr/local/bin/mongodb-language-server > /dev/null
          sudo chmod +x /usr/local/bin/mongodb-language-server
          node /opt/mongodb-vscode/extension/dist/languageServer.js --version 2>/dev/null || echo "server extracted ok"

      - name: Run MongoDB tests
        run: GOWORK=off go test -v -run "TestMultiLanguage/^MongoDB$" ./test/ -timeout 10m

  # mcp-assert-trajectory: validates skill protocol correctness via inline traces.
  # Uses trajectory assertions only — no live server or gopls needed.
  # Each assertion runs in 0ms; total job completes in under 60 seconds.
  mcp-assert-trajectory:
    runs-on: ubuntu-latest
    env:
      GOWORK: "off"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install mcp-assert
        run: |
          git clone --depth 1 https://github.com/blackwell-systems/mcp-assert.git /tmp/mcp-assert
          cd /tmp/mcp-assert && GOWORK=off go install ./cmd/mcp-assert

      - name: Run trajectory assertions
        run: |
          mcp-assert ci \
            --suite examples/mcp-assert/trajectory \
            --timeout 5s \
            --threshold 100 \
            --junit trajectory-results.xml

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-assert-trajectory-results
          path: trajectory-results.xml

  # mcp-assert: deterministic MCP protocol-level assertions against real gopls.
  # Tests all tool correctness and multi-step workflow assertions.
  # Trajectory assertions are excluded (run separately in mcp-assert-trajectory).
  mcp-assert:
    runs-on: ubuntu-latest
    env:
      GOWORK: "off"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build agent-lsp
        run: GOWORK=off go build -o /usr/local/bin/agent-lsp ./cmd/agent-lsp

      - name: Install gopls
        run: go install golang.org/x/tools/gopls@latest

      - name: Install mcp-assert
        run: |
          git clone --depth 1 https://github.com/blackwell-systems/mcp-assert.git /tmp/mcp-assert
          cd /tmp/mcp-assert && GOWORK=off go install ./cmd/mcp-assert

      - name: Run tool correctness assertions against Go fixtures
        run: |
          mcp-assert ci \
            --suite examples/mcp-assert/go \
            --fixture ${{ github.workspace }}/test/fixtures/go \
            --timeout 120s \
            --threshold 100 \
            --reuse-server \
            --junit results.xml \
            --badge badge.json

      - name: Lint MCP tool schemas
        run: |
          mcp-assert lint \
            --server "agent-lsp go:gopls" \
            --threshold 0

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-assert-results
          path: results.xml

      - name: Upload badge
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-assert-badge
          path: badge.json

  change-impact-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: GOWORK=off go build ./...

      - name: Install gopls
        run: go install golang.org/x/tools/gopls@latest

      - name: Run get_change_impact test
        run: GOWORK=off go test -v -run TestGetChangeImpact ./test/ -timeout 8m

  cross-repo-references-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: GOWORK=off go build ./...

      - name: Install gopls
        run: go install golang.org/x/tools/gopls@latest

      - name: Run get_cross_repo_references test
        run: GOWORK=off go test -v -run TestGetCrossRepoReferences ./test/ -timeout 5m
        env:
          AGENT_LSP_OUTPUT_FORMAT: json
