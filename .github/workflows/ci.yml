---
name: CI
on:
  push:
    branches: [main, "cursor/**"]
  pull_request:

jobs:
  test-py:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview, rust-analyzer
      - name: Sync + build native
        run: |
          uv sync --extra dev
          mkdir -p .libs
          ln -sf "$(python3 -c 'import sysconfig; print(sysconfig.get_config_var("LIBDIR"))')"/libpython3.12.so* .libs/libpython3.12.so || true
          ln -sf /usr/lib/x86_64-linux-gnu/libpython3.12.so.1.0 .libs/libpython3.12.so
          export LIBRARY_PATH="$PWD/.libs:$LIBRARY_PATH"
          uv run maturin develop
          (cd packages/agent-lsp-state && uv run maturin develop)
          (cd packages/agent-lsp-git && uv run maturin develop)
          (cd packages/agent-lsp-docker && uv run maturin develop)
      - name: Pytest
        run: uv run pytest -q
      - name: Python coverage (median ≥ 93%)
        run: chmod +x scripts/*.sh && ./scripts/python-coverage.sh

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview, rust-analyzer
      - name: Install cargo-llvm-cov + python link
        run: |
          cargo install cargo-llvm-cov --locked
          uv sync --extra dev
          mkdir -p .libs
          ln -sf /usr/lib/x86_64-linux-gnu/libpython3.12.so.1.0 .libs/libpython3.12.so
      - name: Rust coverage (median ≥ 93%)
        env:
          LIBRARY_PATH: ${{ github.workspace }}/.libs
          LD_LIBRARY_PATH: ${{ github.workspace }}/.libs
        run: chmod +x scripts/*.sh && ./scripts/rust-coverage.sh
