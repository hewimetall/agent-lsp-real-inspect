---
name: CI
on:
  push:
    branches: [main, "cursor/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Sync + build native
        run: |
          uv sync --extra dev
          uv pip install maturin
          (cd packages/agent-lsp-state && uv run maturin develop)
          (cd packages/agent-lsp-git && uv run maturin develop)
          (cd packages/agent-lsp-docker && uv run maturin develop)
      - name: Test
        run: uv run pytest -q
