[build-system]
requires = ["maturin>=1.8,<2"]
build-backend = "maturin"

[project]
name = "agent-lsp-state"
version = "0.1.5"
description = "Persistent sessions, workspaces, and container bindings (Rust PyO3 + SQLite)"
requires-python = ">=3.12"
readme = "README.md"
license = "MIT"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8"]

[tool.maturin]
features = ["extension-module"]
python-source = "python"
# Not published to PyPI — types ship via the root agent-lsp wheel.
module-name = "agent_lsp_state.agent_lsp_state"
