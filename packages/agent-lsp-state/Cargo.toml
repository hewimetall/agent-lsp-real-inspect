[package]
name = "agent-lsp-state"
version = "0.1.0"
edition = "2021"
description = "Sessions, workspaces, container bindings via PyO3 + rusqlite"
license = "MIT"
publish = false

[lib]
# Unique lib name so the root wheel can path-depend on this crate (and git/docker).
name = "agent_lsp_state"
crate-type = ["rlib", "cdylib"]

[dependencies]
pyo3 = { version = "0.29" }
rusqlite = { version = "0.37", features = ["bundled"] }
uuid = { version = "1", features = ["v4"] }
parking_lot = "0.12"

[features]
extension-module = ["pyo3/extension-module"]
default = ["extension-module"]

[dev-dependencies]
pyo3 = { version = "0.29", features = ["auto-initialize"] }
tempfile = "3"
