[package]
name = "agent-lsp-git"
version = "0.1.0"
edition = "2021"
description = "GitPort (hexagonal) with GixGitAdapter — no git CLI"
license = "MIT"
publish = false

[lib]
# Unique lib name so the root wheel can path-depend on this crate.
name = "agent_lsp_git"
crate-type = ["rlib", "cdylib"]

[dependencies]
pyo3 = { version = "0.29" }
gix = { version = "0.73", default-features = false, features = [
    "max-performance-safe",
    "blocking-network-client",
    "blocking-http-transport-reqwest-rust-tls",
] }
gix-date = "0.10"
thiserror = "2"

[features]
extension-module = ["pyo3/extension-module"]
default = ["extension-module"]

[dev-dependencies]
pyo3 = { version = "0.29", features = ["auto-initialize"] }
tempfile = "3"
