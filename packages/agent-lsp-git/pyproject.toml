[build-system]
requires = ["maturin>=1.8,<2"]
build-backend = "maturin"

[project]
name = "agent-lsp-git"
version = "0.1.0"
description = "GitPort + gix (bare, worktree, commit, clone; no git CLI)"
requires-python = ">=3.12"
readme = "README.md"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8"]

[tool.maturin]
features = ["extension-module"]
python-source = "python"
module-name = "agent_lsp_git._native"
