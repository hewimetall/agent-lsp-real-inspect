[package]
name = "agent-lsp-runtime-worker"
version = "0.1.0"
edition = "2021"
description = "Reconcile session container bindings against Docker Engine (dead → stale)"
license = "MIT"
publish = false

[[bin]]
name = "agent-lsp-runtime-worker"
path = "src/main.rs"

[lib]
name = "agent_lsp_runtime_worker"
path = "src/lib.rs"

[dependencies]
bollard = "0.18"
rusqlite = { version = "0.37", features = ["bundled"] }
thiserror = "2"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "signal"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
tempfile = "3"
