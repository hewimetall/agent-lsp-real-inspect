[package]
name = "agent-lsp-docker"
version = "0.1.0"
edition = "2021"
description = "ContainerRuntime port with BollardDockerAdapter — session-held containers"
license = "MIT"
publish = false

[lib]
name = "_native"
crate-type = ["cdylib", "rlib"]

[dependencies]
pyo3 = { version = "0.29" }
bollard = "0.18"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
futures-util = "0.3"
thiserror = "2"
serde = { version = "1", features = ["derive"] }
bytes = "1"

[features]
extension-module = ["pyo3/extension-module"]
default = ["extension-module"]

[dev-dependencies]
pyo3 = { version = "0.29", features = ["auto-initialize"] }
tempfile = "3"
